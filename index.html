<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hermes</title>
<link rel="stylesheet" href="style.css?v=13">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="brand">hermes</div>
    <div id="status-dot" class="status-dot offline"></div>
    <div id="topbar-spacer"></div>
    <button id="btn-sessions" title="Sessions">&#9776;</button>
    <button id="btn-new" title="New Session">+</button>
    <button id="btn-settings" title="Settings">&#9881;</button>
  </div>

  <div id="session-picker" class="hidden">
    <div id="session-list"></div>
  </div>

  <div id="messages">
    <div id="welcome">
      <div id="welcome-prompt">hermes@agent ~ $</div>
      <div id="welcome-msg">ready. type a message to begin.</div>
    </div>
  </div>

  <div id="thinking" class="hidden">
    <span class="thinking-label">thinking</span>
    <span class="dot-anim"><span>.</span><span>.</span><span>.</span></span>
  </div>

  <div id="activity-log" class="hidden"></div>

  <div id="input-area">
    <span id="prompt-char">&gt;</span>
    <textarea id="input" rows="1" placeholder="send a message..." autofocus></textarea>
    <button id="btn-send" title="Send">&#9654;</button>
    <button id="btn-stop" class="hidden" title="Stop">&#9632;</button>
  </div>
</div>

<div id="settings-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">settings</div>
    <label>API URL</label>
    <input type="text" id="setting-url" placeholder="http://localhost:8642">
    <label>API KEY</label>
    <input type="password" id="setting-key" placeholder="key">
    <div class="modal-actions">
      <button id="btn-save-settings">save</button>
      <button id="btn-close-settings">cancel</button>
    </div>
  </div>
</div>

<script src="app.js?v=13"></script>
</body>
</html>
